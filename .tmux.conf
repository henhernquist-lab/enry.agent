# enry.agent tmux defaults — kept in-repo, symlinked to ~/.tmux.conf by
# .devcontainer/postCreate.sh so mouse support, keybindings, and the status
# bar are identical across Codespace rebuilds. Loaded automatically when the
# "Open Enry Workspace" task (.vscode/tasks.json) starts the tmux server.

# Click to focus panes, drag borders to resize, scroll to see history.
set -g mouse on

# 1-based window and pane numbering (matches the status bar; nicer than 0).
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Pane switching -----------------------------------------------------
# No-prefix Alt+Arrow: move focus between panes with one keystroke.
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
# Vim-style with the prefix (default prefix is Ctrl-b): C-b then h/j/k/l.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Status bar ---------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-left  "#[bold] enry:#S #[default]"
set -g status-left-length 24
set -g status-right "#[fg=green]#{?client_prefix,PREFIX ,}#[default]%a %H:%M"
set -g status-justify left

# Per-pane titles across the top border — the workspace layout labels the
# left pane "drive-dev" and the free terminals so you can tell them apart.
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "

# --- Quality of life -----------------------------------------------------
set -sg escape-time 10
set -g history-limit 10000
set -g focus-events on
# Reload this config in place with: C-b r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
